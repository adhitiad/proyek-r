services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    command:
      [
        "streamlit",
        "run",
        "dashboard.py",
        "--server.address=0.0.0.0",
        "--server.port=8501",
      ]
    ports:
      - "8501:8501"
    depends_on:
      - backend
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
